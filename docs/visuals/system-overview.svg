<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5632;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8659;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="white" font-size="24" font-weight="bold">municipal-asset-management-system</text>
  <text x="400" y="70" text-anchor="middle" fill="#a7f3d0" font-size="14">AllIR Solutions — System Overview</text>
  
  <!-- User Box -->
  <rect x="50" y="120" width="140" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="120" y="155" text-anchor="middle" fill="#1a5632" font-size="28">👤</text>
  <text x="120" y="180" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">Users</text>
  
  <!-- Frontend Box -->
  <rect x="260" y="100" width="160" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="340" y="140" text-anchor="middle" fill="#2563eb" font-size="28">🖥️</text>
  <text x="340" y="165" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">Web Frontend</text>
  <text x="340" y="185" text-anchor="middle" fill="#6b7280" font-size="10">React + TailwindCSS</text>
  <text x="340" y="205" text-anchor="middle" fill="#6b7280" font-size="10">AI Chatbot Widget</text>
  
  <!-- Backend Box -->
  <rect x="490" y="100" width="160" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="570" y="140" text-anchor="middle" fill="#ea580c" font-size="28">⚙️</text>
  <text x="570" y="165" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">API Server</text>
  <text x="570" y="185" text-anchor="middle" fill="#6b7280" font-size="10">Node.js / Express</text>
  <text x="570" y="205" text-anchor="middle" fill="#6b7280" font-size="10">REST API</text>
  
  <!-- Database -->
  <rect x="490" y="290" width="140" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="560" y="325" text-anchor="middle" fill="#7c3aed" font-size="28">🗄️</text>
  <text x="560" y="350" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">Database</text>
  
  <!-- AI -->
  <rect x="260" y="290" width="160" height="80" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="340" y="325" text-anchor="middle" fill="#dc2626" font-size="28">🤖</text>
  <text x="340" y="350" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">AI Assistant</text>
  
  <!-- Arrows -->
  <line x1="190" y1="160" x2="255" y2="160" stroke="white" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="425" y1="160" x2="485" y2="160" stroke="white" stroke-width="2"/>
  <line x1="570" y1="225" x2="570" y2="285" stroke="white" stroke-width="2"/>
  <line x1="490" y1="330" x2="425" y2="330" stroke="white" stroke-width="2"/>
  <line x1="340" y1="225" x2="340" y2="285" stroke="white" stroke-width="2"/>
  
  <!-- Footer -->
  <text x="400" y="440" text-anchor="middle" fill="#a7f3d0" font-size="11">Built with ❤️ by AllIR Solutions — Construction &amp; IT Excellence</text>
  <text x="400" y="460" text-anchor="middle" fill="#6ee7b7" font-size="10">CIDB Grading: 6GB / 5CE</text>
</svg>