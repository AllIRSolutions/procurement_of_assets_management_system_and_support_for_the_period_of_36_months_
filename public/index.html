<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Municipal Asset Management System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sa-green': '#007749',
                        'sa-blue': '#001489',
                        'sa-gold': '#FFB612',
                        'sa-red': '#DE3831',
                        'sa-black': '#000000',
                        'sa-white': '#FFFFFF'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            BarChart3, 
            Package, 
            Wrench, 
            DollarSign, 
            FileText, 
            MapPin, 
            Users, 
            Settings,
            Bell,
            Search,
            Menu,
            X,
            MessageCircle,
            Send,
            Minimize2,
            Maximize2,
            Calendar,
            TrendingUp,
            AlertTriangle,
            CheckCircle,
            Clock,
            Shield
        } = lucide;

        const Icon = ({ icon: IconComponent, ...props }) => {
            return React.createElement(IconComponent, props);
        };

        const ChatWidget = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { id: 1, text: "Hello! I'm your AI assistant for asset management. How can I help you today?", isBot: true }
            ]);
            const [newMessage, setNewMessage] = useState("");

            const sendMessage = () => {
                if (newMessage.trim()) {
                    setMessages([...messages, 
                        { id: messages.length + 1, text: newMessage, isBot: false },
                        { id: messages.length + 2, text: "I understand you need help with that. Let me assist you with your asset management query.", isBot: true }
                    ]);
                    setNewMessage("");
                }
            };

            return (
                <div className="fixed bottom-4 right-4 z-50">
                    {isOpen && (
                        <div className="bg-white rounded-lg shadow-xl w-80 h-96 mb-4 border border-gray-200">
                            <div className="flex items-center justify-between p-4 border-b bg-sa-green text-white rounded-t-lg">
                                <h3 className="font-semibold">AI Assistant</h3>
                                <button onClick={() => setIsOpen(false)}>
                                    <Icon icon={X} size={20} />
                                </button>
                            </div>
                            <div className="h-64 p-4 overflow-y-auto">
                                {messages.map(msg => (
                                    <div key={msg.id} className={`mb-3 ${msg.isBot ? 'text-left' : 'text-right'}`}>
                                        <div className={`inline-block p-2 rounded-lg max-w-xs ${
                                            msg.isBot ? 'bg-gray-100 text-gray-800' : 'bg-sa-green text-white'
                                        }`}>
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t">
                                <div className="flex">
                                    <input
                                        type="text"
                                        value={newMessage}
                                        onChange={(e) => setNewMessage(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                        placeholder="Type your message..."
                                        className="flex-1 p-2 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-sa-green"
                                    />
                                    <button 
                                        onClick={sendMessage}
                                        className="bg-sa-green text-white p-2 rounded-r-lg hover:bg-green-700"
                                    >
                                        <Icon icon={Send} size={20} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className="bg-sa-green text-white p-4 rounded-full shadow-lg hover:bg-green-700 transition-colors"
                    >
                        <Icon icon={MessageCircle} size={24} />
                    </button>
                </div>
            );
        };

        const StatsCard = ({ title, value, icon, trend, color }) => {
            return (
                <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-gray-600 text-sm font-medium">{title}</p>
                            <p className="text-2xl font-bold text-gray-900">{value}</p>
                            {trend && (
                                <p className={`text-sm ${trend.positive ? 'text-green-600' : 'text-red-600'}`}>
                                    {trend.value}
                                </p>
                            )}
                        </div>
                        <div className={`p-3 rounded-lg ${color}`}>
                            <Icon icon={icon} size={24} className="text-white" />
                        </div>
                    </div>
                </div>
            );
        };

        const AssetTable = () => {
            const assets = [
                { id: 'AST001', name: 'Municipal Vehicle - Toyota Hilux', category: 'Transport', location: 'Main Office', status: 'Active', lastMaintenance: '2024-01-15' },
                { id: 'AST002', name: 'Water Pump Station #3', category: 'Infrastructure', location: 'Sector B', status: 'Maintenance', lastMaintenance: '2024-01-10' },
                { id: 'AST003', name: 'Office Computer - Dell OptiPlex', category: 'IT Equipment', location: 'Admin Building', status: 'Active', lastMaintenance: '2023-12-20' },
                { id: 'AST004', name: 'Street Light - LED Panel', category: 'Infrastructure', location: 'Main Street', status: 'Active', lastMaintenance: '2024-01-08' },
            ];

            return (
                <div className="bg-white rounded-lg shadow-sm border border-gray-200">
                    <div className="p-6 border-b">
                        <h3 className="text-lg font-semibold text-gray-900">Recent Assets</h3>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Asset ID</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Location</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Last Maintenance</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {assets.map(asset => (
                                    <tr key={asset.id}>
                                        <td className="px-6 py-4 text-sm font-medium text-gray-900">{asset.id}</td>
                                        <td className="px-6 py-4 text-sm text-gray-900">{asset.name}</td>
                                        <td className="px-6 py-4 text-sm text-gray-600">{asset.category}</td>
                                        <td className="px-6 py-4 text-sm text-gray-600">{asset.location}</td>
                                        <td className="px-6 py-4">
                                            <span className={`inline-flex px-2 py-1 text-xs font-semibold rounded-full ${
                                                asset.status === 'Active' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                                            }`}>
                                                {asset.status}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 text-sm text-gray-600">{asset.lastMaintenance}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const AlertsPanel = () => {
            const alerts = [
                { id: 1, type: 'maintenance', message: 'Vehicle AST001 due for service', priority: 'high', time: '2 hours ago' },
                { id: 2, type: 'warranty', message: 'IT Equipment warranty expiring soon', priority: 'medium', time: '5 hours ago' },
                { id: 3, type: 'location', message: 'Asset AST045 moved outside designated area', priority: 'high', time: '1 day ago' },
                { id: 4, type: 'compliance', message: 'GRAP compliance report pending', priority: 'low', time: '2 days ago' },
            ];

            return (
                <div className="bg-white rounded-lg shadow-sm border border-gray-200">
                    <div className="p-6 border-b">
                        <h3 className="text-lg font-semibold text-gray-900">Recent Alerts</h3>
                    </div>
                    <div className="p-6">
                        <div className="space-y-4">
                            {alerts.map(alert => (
                                <div key={alert.id} className="flex items-start space-x-3">
                                    <div className={`p-2 rounded-full ${
                                        alert.priority === 'high' ? 'bg-red-100' : 
                                        alert.priority === 'medium' ? 'bg-yellow-100' : 'bg-blue-100'
                                    }`}>
                                        <Icon 
                                            icon={alert.priority === 'high' ? AlertTriangle : Bell} 
                                            size={16} 
                                            className={
                                                alert.priority === 'high' ? 'text-red-600' : 
                                                alert.priority === 'medium' ? 'text-yellow-600' : 'text-blue-600'
                                            }
                                        />
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm font-medium text-gray-900">{alert.message}</p>
                                        <p className="text-xs text-gray-500">{alert.time}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');

            const menuItems = [
                { id: 'dashboard', name: 'Dashboard', icon: BarChart3 },
                { id: 'assets', name: 'Asset Management', icon: Package },
                { id: 'maintenance', name: 'Maintenance', icon: Wrench },
                { id: 'financial', name: 'Financial Tracking', icon: DollarSign },
                { id: 'reports', name: 'Compliance Reports', icon: FileText },
                { id: 'locations', name: 'Location Tracking', icon: MapPin },
                { id: 'users', name: 'User Management', icon: Users },
                { id: 'settings', name: 'Settings', icon: Settings },
            ];

            return (
                <div className="flex h-screen bg-gray-50">
                    {/* Sidebar */}
                    <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-lg transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0`}>
                        <div className="flex items-center justify-center h-16 px-4 bg-sa-green">
                            <h1 className="text-white text-xl font-bold">Municipal AMS</h1>
                        </div>
                        <nav className="mt-8">
                            {menuItems.map(item => (
                                <a
                                    key={item.id}
                                    href="#"
                                    onClick={() => {
                                        setActiveTab(item.id);
                                        setSidebarOpen(false);
                                    }}
                                    className={`flex items-center px-6 py-3 text-left w-full hover:bg-gray-50 ${
                                        activeTab === item.id ? 'bg-sa-green text-white' : 'text-gray-700'
                                    }`}
                                >
                                    <Icon icon={item.icon} size={20} className="mr-3" />
                                    {item.name}
                                </a>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Header */}
                        <header className="bg-white shadow-sm border-b border-gray-200">
                            <div className="flex items-center justify-between px-6 py-4">
                                <div className="flex items-center">
                                    <button
                                        onClick={() => setSidebarOpen(!sidebarOpen)}
                                        className="lg:hidden p-2 rounded-md hover:bg-gray-100"
                                    >
                                        <Icon icon={Menu} size={24} />
                                    </button>
                                    <div className="ml-4 lg:ml-0">
                                        <h2 className="text-xl font-semibold text-gray-900">Asset Management Dashboard</h2>
                                        <p className="text-sm text-gray-600">Welcome back, Municipality Admin</p>
                                    </div>
                                </div>
                                <div className
